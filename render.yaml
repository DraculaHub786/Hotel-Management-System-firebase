services:
  - type: web
    name: hotel-management-system
    env: python
    runtime: python-3.11.0
    plan: free
    
    # Build command
    buildCommand: pip install -r requirements.txt
    
    # Start command
    startCommand: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python python app.py
    
    # Environment variables
    envVars:
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - key: FLASK_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        scope: secret
      - key: FIREBASE_CREDENTIALS_PATH
        value: firebase-credentials.json
    
    # Health check
    healthCheckPath: /api/health

# Note: Set environment variables securely via Render Dashboard
# - Add FIREBASE_CREDENTIALS_PATH and SECRET_KEY as secrets
# - Copy firebase-credentials.json to the instance
